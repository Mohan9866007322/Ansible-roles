  - name: Disable nginx module letest version    
    ansible.builtin.command: dnf module disable nginx -y
    
  - name: Enable nginx module letest version
    ansible.builtin.command: dnf module enable nginx:1.24 -y

  - name: Install nginx
    ansible.builtin.dnf:
      name: nginx
      state: present
  
  - name: start and enable nginx
    ansible.builtin.service:
      name: nginx
      state: started
      enabled: true
  
  - name: remove the content of directory /usr/share/nginx/html
    ansible.builtin.file:
      path: /usr/share/nginx/html
      state: directory

  - name: create html directory
    ansible.builtin.file:
      state: directory
      path: /usr/share/nginx/html

  - name: Download frontend code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/frontend.zip 
      dest: /tmp/frontend.zip 

  - name: Unzip frontend code
    ansible.builtin.unarchive:
      src: /tmp/frontend.zip
      dest: /usr/share/nginx/html
      remote_src: yes

  - name: remove default nginx configuration file
    ansible.builtin.file:
      path: /etc/nginx/nginx.conf
      state: absent

  - name: copy nginx configuration file
    ansible.builtin.template:
      src: nginx.conf.j2
      dest: /etc/nginx/conf.d
    notify: Restart nginx
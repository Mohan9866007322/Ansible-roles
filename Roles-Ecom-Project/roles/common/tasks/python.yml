  - name: Install Python3 and pip3
    ansible.builtin.dnf:
      name: 
        - python3
        - python3-devel
        - gcc
      state: present
      
  - name: Install dependencies from requirements.txt
    ansible.builtin.pip:
      requirements: /home/roboshop/payment/requirements.txt
      executable: /usr/bin/pip3.9
    args:
      chdir: /app
    
  - name: Create systemd service file for payment component
    ansible.builtin.copy:
      src: payment.service
      dest: /etc/systemd/system/payment.service

  - name: daemon reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: Start and enable payment service
    ansible.builtin.service:
      name: payment
      state: started
      enabled: true
  - name: Install Python3 and pip3
    ansible.builtin.dnf:
      name: 
        - python3
        - python3-devel
        - gcc
      state: present

  - name: Install dependencies from requirements.txt
    ansible.builtin.pip:
      requirements: /home/roboshop/payment/requirements.txt
      executable: /usr/bin/pip3.9
    args:
      chdir: /app
